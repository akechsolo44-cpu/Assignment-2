{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h1>Create Account</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p style="text-align:center;margin-top:20px;">

        Already have an account?

        <a href="/login">
            Login Here
        </a>

    </p>

</div>

{% endblock %}
