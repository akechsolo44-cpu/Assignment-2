{% extends "admin_base.html" %}

{% block title %}

Edit Product

{% endblock %}

{% block content %}

<section class="hero">

    <h1>Edit Product</h1>

    <p>

        Update product information below.

    </p>

</section>

<div class="form-container">

    <form method="POST">

        <input
            type="text"
            name="name"
            value="{{ product['name'] }}"
            required>

        <input
            type="number"
            step="0.01"
            name="price"
            value="{{ product['price'] }}"
            required>

        <textarea
            name="description"
            required>{{ product['description'] }}</textarea>

        <input
            type="text"
            name="image"
            value="{{ product['image'] }}"
            required>

        <input
            type="number"
            name="stock"
            value="{{ product['stock'] }}"
            min="0"
            required>

        <button type="submit">

            Save Changes

        </button>

    </form>

</div>

{% endblock %}
