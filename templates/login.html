{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h1>Login</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p style="text-align:center; margin-top:20px;">

        Don't have an account?

        <a href="/register">
            Register Here
        </a>

    </p>

</div>

{% endblock %}
