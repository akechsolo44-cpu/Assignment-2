{% extends "admin_base.html" %}

{% block title %}

Add Product

{% endblock %}

{% block content %}

<section class="hero">

    <h1>Add New Product</h1>

    <p>

        Fill in the details below to add a new product to CampusWear.

    </p>

</section>

<div class="form-container">

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Product Name"
            required>

        <input
            type="number"
            step="0.01"
            name="price"
            placeholder="Price"
            required>

        <textarea
            name="description"
            placeholder="Product Description"
            required></textarea>

        <input
            type="text"
            name="image"
            placeholder="Image Filename (e.g. hoodie.jpg)"
            required>

        <input
            type="number"
            name="stock"
            placeholder="Stock Quantity"
            min="0"
            required>

        <button type="submit">

            Add Product

        </button>

    </form>

</div>

{% endblock %}
